# MorphSeq Pipeline Configuration

# Data paths
data_root: "data_pipeline_output"

# Experiments to process
experiments:
  - 20250912

# Optional per-experiment well subsets for smoke runs or targeted reruns.
experiment_wells:
  20240418:
    - A01
    - C01

# Microscope selection.
# If you need per-experiment microscope selection, add:
# microscope_by_experiment:
#   20250912: "YX1"
microscope: "YX1"

# Plate metadata is optional for build/segment/snips, but kept for later biology/QC/analysis.
plate_metadata:
  enabled: true
  # Expected input path:
  #   {data_root}/inputs/plate_metadata/{experiment}_well_metadata.xlsx

# Scope metadata (physical) extraction.
scope_metadata:
  yx1:
    raw_images_pattern: "YX1/{experiment}"
  keyence:
    raw_images_pattern: "Keyence/{experiment}"

# Image building (stitched FF images).
image_building:
  device: "cuda"
  overwrite: false
  yx1:
    z_buffer: false
  # Keyence support depends on having FF tiles/inputs wired; leave disabled for now.
  keyence:
    enabled: false

# Segmentation + tracking (GroundingDINO + SAM2).
segmentation_and_tracking:
  device: "cuda"
  channel_id: "BF"
  tracking_mode: "bidirectional"
  models_root: "models"
  groundingdino_repo: "GroundingDINO"
  groundingdino_config: "groundingdino/config/GroundingDINO_SwinT_OGC.py"
  groundingdino_weights: "weights/groundingdino_swint_ogc.pth"
  groundingdino_release: "legacy"
  groundingdino_model_name: "SwinT_OGC"
  sam2_models_root: "sam2"
  sam2_config: "configs/sam2.1/sam2.1_hiera_l.yaml"
  sam2_checkpoint: "checkpoints/sam2.1_hiera_large.pt"
  sam2_release: "legacy"
  sam2_model_name: "hiera_large"
  groundingdino:
    text_prompt: "individual embryo"
    box_threshold: 0.35
    text_threshold: 0.25
    confidence_threshold: 0.45
    iou_threshold: 0.5
    config_path: ""
    weights_path: ""
  sam2:
    config_path: ""
    checkpoint_path: ""

# Auxiliary masks (UNet-derived QC masks).
auxiliary_masks:
  model_root: "models/segmentation"
  batch_size: 64
  num_workers: 1
  overwrite: false

# Snip processing (crop + rotate + augment).
snip_processing:
  # Legacy downstream models expect (H, W) = (576, 256).
  output_shape: [576, 256]
  target_pixel_size_um: 7.8
  save_raw_crops: true
  write_manifest_csv: true
  background_n_samples: 100
  background_seed: 309

# Feature extraction stage defaults.
feature_extraction:
  stage_predictions: {}

# Phase 5: QC (placeholder)
qc:
  edge_margin_pixels: 2
  death_fraction_threshold: 0.9

# Snakemake settings
threads: 4
resources:
  mem_mb: 8000
  gpu: 0
