# MorphSeq Pipeline Configuration

# Data paths.
# Relative paths resolve from PROJECT_ROOT (repo root). Absolute paths used as-is.
# Defaults:
#   data_root:           PROJECT_ROOT/data_pipeline_output
#   data_pipeline_code:  PROJECT_ROOT/src/data_pipeline
# Override examples:
#   data_root: "/net/trapnell/vol1/home/mdcolon/proj/morphseq-docs/data_pipeline_output"
#   data_pipeline_code: "/some/other/pipeline/src"

# Experiments to process
experiments:
  - 20250912

# Optional smoke-test subset. Accepts canonical wells (B01) or full well IDs
# (20250912_B01). Non-empty values write outputs under:
#   {data_root}/scoped_runs/wells-.../
# Leave empty for full-plate processing in canonical output locations.
target_wells: []

# Microscope selection.
# If you need per-experiment microscope selection, add:
# microscope_by_experiment:
#   20250912: "YX1"
microscope: "YX1"

# Plate metadata is optional for build/segment/snips, but kept for later biology/QC/analysis.
plate_metadata:
  enabled: true
  # Expected input path:
  #   {data_root}/inputs/plate_metadata/{experiment}_well_metadata.xlsx

# Scope metadata (physical) extraction.
scope_metadata:
  yx1:
    raw_images_pattern: "YX1/{experiment}"
  keyence:
    raw_images_pattern: "Keyence/{experiment}"

# Image building (stitched FF images).
image_building:
  device: "cuda"
  overwrite: false
  image_format: "jpg"
  yx1:
    z_buffer: false
  # Keyence support depends on having FF tiles/inputs wired; leave disabled for now.
  keyence:
    enabled: false

# Segmentation + tracking (GroundingDINO + SAM2).
segmentation_and_tracking:
  device: "cuda"
  channel_id: "BF"
  tracking_mode: "bidirectional"
  groundingdino:
    text_prompt: "individual embryo"
    box_threshold: 0.35
    text_threshold: 0.25
    confidence_threshold: 0.45
    iou_threshold: 0.5
    config_path: "segmentation_sandbox/models/GroundingDINO/groundingdino/config/GroundingDINO_SwinT_OGC.py"
    weights_path: "/net/trapnell/vol1/home/mdcolon/proj/image_segmentation/Open-GroundingDino/finetune_output/finetune_output_run_nick_masks_20250308/checkpoint_best_regular.pth"
  sam2:
    config_path: "configs/sam2.1/sam2.1_hiera_l.yaml"
    checkpoint_path: "/net/trapnell/vol1/home/mdcolon/proj/image_segmentation/sam2/checkpoints/sam2.1_hiera_large.pt"

# Auxiliary masks (UNet-derived QC masks).
auxiliary_masks:
  model_root: "models/segmentation"
  batch_size: 64
  num_workers: 1
  overwrite: false

# Snip processing (crop + rotate + augment).
snip_processing:
  # Legacy downstream models expect (H, W) = (576, 256).
  output_shape: [576, 256]
  target_pixel_size_um: 7.8
  save_raw_crops: true
  write_manifest_csv: true
  background_n_samples: 100
  background_seed: 309

# Phase 5: QC (placeholder)
qc:
  edge_margin_pixels: 2
  death_fraction_threshold: 0.9

# Snakemake settings
threads: 4
resources:
  mem_mb: 8000
  gpu: 0
